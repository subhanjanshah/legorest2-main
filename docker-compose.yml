version: '3.8'

services:
  tomcat:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: legodb
      MYSQL_USER: lego
      MYSQL_PASSWORD: lego
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: